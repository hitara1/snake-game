<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🐍 Snake Game</h1>
        <div class="score-board">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="high-score">High Score: <span id="high-score">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <p>Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to control the snake</p>
            <button id="start-btn">Start Game</button>
        </div>
        <div class="mobile-controls">
            <div class="d-pad">
                <button class="dir-btn" id="up">▲</button>
                <div class="d-pad-middle">
                    <button class="dir-btn" id="left">◀</button>
                    <button class="dir-btn" id="right">▶</button>
                </div>
                <button class="dir-btn" id="down">▼</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
